spring:
  application:
    name: cinema-service

  # Профиль по умолчанию: H2 (для разработки и тестирования)
  datasource:
    url: jdbc:h2:mem:cinemadb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

server:
  port: 8080
