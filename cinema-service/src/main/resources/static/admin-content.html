<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
  <title>Управление контентом · MovieHub Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header data-include="navbar"></header>

  <!-- Pattern: Linear admin table — sticky header, sortable columns, status pills inline -->
  <div class="admin-layout">
    <div data-include="admin-sidebar"></div>

    <main class="admin-content">
      <div class="admin-page-head">
        <div>
          <span class="eyebrow">Контент</span>
          <h1>Фильмы и сериалы</h1>
        </div>
        <div class="d-flex align-items-center gap-3">
          <div class="text-muted small mono" id="content-count">—</div>
          <button class="g-btn g-btn-primary" type="button" id="add-content-btn">+ Добавить</button>
        </div>
      </div>

      <div class="mb-3">
        <input type="search" class="form-control" id="search-q" placeholder="Поиск по названию…" autocomplete="off">
      </div>

      <div class="filter-rail-section">
        <div class="filter-rail-label">Статус</div>
        <div class="filter-rail-group" id="status-group">
          <button class="filter-chip is-active" data-status="">Все</button>
          <button class="filter-chip" data-status="PUBLISHED">Опубликованы</button>
          <button class="filter-chip" data-status="DRAFT">Черновик</button>
          <button class="filter-chip" data-status="HIDDEN">Скрыты</button>
        </div>
        <div class="filter-rail-label mt-2">Тип</div>
        <div class="filter-rail-group" id="type-group">
          <button class="filter-chip is-active" data-type="">Все</button>
          <button class="filter-chip" data-type="MOVIE">Фильмы</button>
          <button class="filter-chip" data-type="SERIES">Сериалы</button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th class="sortable" data-sort="id">ID <span class="sort-ind"></span></th>
              <th class="sortable" data-sort="title">Название <span class="sort-ind"></span></th>
              <th class="sortable" data-sort="contentType">Тип <span class="sort-ind"></span></th>
              <th class="sortable" data-sort="releaseYear">Год <span class="sort-ind"></span></th>
              <th class="sortable" data-sort="averageRating">★ <span class="sort-ind"></span></th>
              <th class="sortable" data-sort="status">Статус <span class="sort-ind"></span></th>
              <th class="sortable" data-sort="createdAt">Создан <span class="sort-ind"></span></th>
              <th class="text-end">Действия</th>
            </tr>
          </thead>
          <tbody id="content-tbody"></tbody>
        </table>
      </div>

      <div id="pagination-mount"></div>
    </main>
  </div>

  <!-- Modal: создание нового контента -->
  <div class="modal fade" id="newContentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content" style="background:var(--bg-card); border:1px solid var(--border-strong); border-radius:var(--r-xl)">
        <div class="modal-body p-4">
          <h4 class="mb-3" id="nc-modal-title">Новый контент</h4>
          <div class="auth-alert" id="new-content-error" hidden></div>

          <!-- Поиск через публичный IMDB autocomplete — заполняет форму -->
          <div class="nc-imdb-search mb-3">
            <label class="form-label" for="nc-imdb-search">Найти на IMDB</label>
            <div class="d-flex gap-2 align-items-start">
              <input class="form-control" type="text" id="nc-imdb-search" placeholder="Inception, The Dark Knight, Breaking Bad…" autocomplete="off">
              <button class="g-btn g-btn-ghost" type="button" id="nc-imdb-go">Подгрузить</button>
            </div>
            <div id="nc-imdb-results" class="nc-imdb-results" hidden></div>
          </div>

          <hr class="my-3" style="border-color: var(--border)">

          <form id="new-content-form" novalidate>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label">Тип</label>
                <div class="d-flex gap-2" id="nc-type-group">
                  <button type="button" class="filter-chip is-active" data-type="MOVIE">Фильм</button>
                  <button type="button" class="filter-chip" data-type="SERIES">Сериал</button>
                </div>
              </div>
              <div class="col-md-6 nc-edit-only" id="nc-status-wrap" hidden>
                <label class="form-label" for="nc-status">Статус</label>
                <select class="form-select" id="nc-status">
                  <option value="DRAFT">Черновик</option>
                  <option value="MODERATION">На модерации</option>
                  <option value="PUBLISHED">Опубликован</option>
                  <option value="REJECTED">Отклонён</option>
                  <option value="HIDDEN">Скрыт</option>
                  <option value="DELETED">Удалён</option>
                </select>
              </div>
            </div>

            <div class="row g-3">
              <div class="col-md-8">
                <label class="form-label" for="nc-title">Название *</label>
                <div class="d-flex gap-2">
                  <input class="form-control" type="text" id="nc-title" maxlength="255" required>
                  <button type="button" class="g-btn g-btn-ghost" id="nc-title-translate" title="Перевести на русский">RU</button>
                </div>
              </div>
              <div class="col-md-4">
                <label class="form-label" for="nc-year">Год</label>
                <input class="form-control" type="number" id="nc-year" min="1900" max="2100" step="1">
              </div>
            </div>

            <div class="mb-3 mt-3">
              <label class="form-label" for="nc-original">Оригинальное название</label>
              <input class="form-control" type="text" id="nc-original" maxlength="255">
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label" for="nc-country">Страна</label>
                <input class="form-control" type="text" id="nc-country" maxlength="100" list="nc-countries" autocomplete="off">
                <datalist id="nc-countries">
                  <option value="США"></option>
                  <option value="Великобритания"></option>
                  <option value="Россия"></option>
                  <option value="СССР"></option>
                  <option value="Франция"></option>
                  <option value="Германия"></option>
                  <option value="Италия"></option>
                  <option value="Испания"></option>
                  <option value="Япония"></option>
                  <option value="Южная Корея"></option>
                  <option value="Китай"></option>
                  <option value="Индия"></option>
                  <option value="Канада"></option>
                  <option value="Австралия"></option>
                  <option value="Бразилия"></option>
                  <option value="Мексика"></option>
                  <option value="Швеция"></option>
                  <option value="Дания"></option>
                  <option value="Польша"></option>
                  <option value="Чехия"></option>
                </datalist>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="nc-language">Язык</label>
                <input class="form-control" type="text" id="nc-language" maxlength="50" list="nc-languages" autocomplete="off">
                <datalist id="nc-languages">
                  <option value="Английский"></option>
                  <option value="Русский"></option>
                  <option value="Французский"></option>
                  <option value="Немецкий"></option>
                  <option value="Испанский"></option>
                  <option value="Итальянский"></option>
                  <option value="Японский"></option>
                  <option value="Корейский"></option>
                  <option value="Китайский"></option>
                  <option value="Хинди"></option>
                  <option value="Португальский"></option>
                  <option value="Шведский"></option>
                  <option value="Польский"></option>
                  <option value="Чешский"></option>
                </datalist>
              </div>
            </div>

            <div class="row g-3 mt-1">
              <div class="col-md-6">
                <label class="form-label" for="nc-imdb">IMDb ID</label>
                <input class="form-control" type="text" id="nc-imdb" maxlength="20" placeholder="tt0111161">
              </div>
              <div class="col-md-6">
                <label class="form-label" for="nc-kp">Кинопоиск ID</label>
                <input class="form-control" type="text" id="nc-kp" maxlength="20">
              </div>
            </div>

            <div class="mb-3 mt-3">
              <label class="form-label">Постер</label>
              <div class="nc-poster-row">
                <div class="nc-poster-preview" id="nc-poster-preview">
                  <div class="nc-poster-empty">нет</div>
                </div>
                <div class="nc-poster-controls">
                  <input class="form-control" type="file" id="nc-poster-file" accept="image/*">
                  <input class="form-control mt-2" type="url" id="nc-poster" maxlength="500" placeholder="…или вставь URL вручную">
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label d-flex justify-content-between align-items-center" for="nc-description">
                <span>Описание</span>
                <button type="button" class="g-btn g-btn-ghost g-btn-sm" id="nc-desc-translate" title="Перевести на RU">Перевести на RU</button>
              </label>
              <textarea class="form-control" id="nc-description" rows="4"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Теги</label>
              <div id="nc-tags-mount" class="d-flex flex-wrap gap-2">
                <span class="text-muted small">загрузка…</span>
              </div>
              <div class="text-muted small mt-1">Создавать новые теги — в разделе «Теги» бокового меню.</div>
            </div>

            <!-- Movie-only fields -->
            <fieldset class="nc-movie-only">
              <legend class="form-label" style="font-size:12px;color:var(--text-muted)">Параметры фильма</legend>
              <div class="row g-3">
                <div class="col-md-4">
                  <label class="form-label" for="nc-duration">Длительность (мин)</label>
                  <input class="form-control" type="number" id="nc-duration" min="0" step="1">
                </div>
                <div class="col-md-4">
                  <label class="form-label" for="nc-budget">Бюджет, $</label>
                  <input class="form-control" type="number" id="nc-budget" min="0" step="1000">
                </div>
                <div class="col-md-4">
                  <label class="form-label" for="nc-boxoffice">Сборы, $</label>
                  <input class="form-control" type="number" id="nc-boxoffice" min="0" step="1000">
                </div>
              </div>
            </fieldset>

            <!-- Series-only fields -->
            <fieldset class="nc-series-only" hidden>
              <legend class="form-label" style="font-size:12px;color:var(--text-muted)">Параметры сериала</legend>
              <div class="row g-3">
                <div class="col-md-4">
                  <label class="form-label" for="nc-seasons">Сезонов</label>
                  <input class="form-control" type="number" id="nc-seasons" min="0" step="1">
                </div>
                <div class="col-md-4">
                  <label class="form-label" for="nc-episodes">Эпизодов</label>
                  <input class="form-control" type="number" id="nc-episodes" min="0" step="1">
                </div>
                <div class="col-md-4 d-flex align-items-center">
                  <div class="form-check mt-3">
                    <input class="form-check-input" type="checkbox" id="nc-finished">
                    <label class="form-check-label" for="nc-finished">Сериал завершён</label>
                  </div>
                </div>
              </div>
            </fieldset>

            <div class="d-flex gap-2 justify-content-end mt-4">
              <button type="button" class="g-btn g-btn-ghost" data-bs-dismiss="modal">Отмена</button>
              <button type="submit" class="g-btn g-btn-primary" id="nc-submit-btn">Создать</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <footer data-include="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/partials.js"></script>
  <script src="/js/page-admin-content.js"></script>
</body>
</html>
