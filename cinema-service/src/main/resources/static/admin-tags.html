<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
  <title>Управление тегами · MovieHub Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header data-include="navbar"></header>

  <div class="admin-layout">
    <div data-include="admin-sidebar"></div>

    <main class="admin-content">
      <div class="admin-page-head">
        <div>
          <span class="eyebrow">Контент</span>
          <h1>Теги</h1>
          <p class="text-muted small mb-0">Тонкие пометки настроения и повода (новогоднее, ностальгия, культовое). Жанры — отдельная сущность, редактируются в БД.</p>
        </div>
        <div class="text-muted small mono" id="tags-count">—</div>
      </div>

      <div class="card mb-4" style="background:var(--bg-card); border:1px solid var(--border-strong); border-radius:var(--r-lg)">
        <div class="card-body">
          <h5 class="mb-3">Новый тег</h5>
          <div class="auth-alert" id="new-tag-error" hidden></div>
          <form id="new-tag-form" class="row g-2 align-items-end">
            <div class="col-md-4">
              <label class="form-label" for="nt-name">Название *</label>
              <input class="form-control" type="text" id="nt-name" maxlength="50" required>
            </div>
            <div class="col-md-3">
              <label class="form-label" for="nt-slug">Slug *</label>
              <input class="form-control" type="text" id="nt-slug" maxlength="50" placeholder="latin-kebab" required>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="nt-description">Описание</label>
              <input class="form-control" type="text" id="nt-description" maxlength="255">
            </div>
            <div class="col-md-1">
              <button type="submit" class="g-btn g-btn-primary w-100">+</button>
            </div>
          </form>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Название</th>
              <th>Slug</th>
              <th>Описание</th>
              <th>Контента</th>
              <th class="text-end">Действия</th>
            </tr>
          </thead>
          <tbody id="tags-tbody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <footer data-include="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/partials.js"></script>
  <script src="/js/page-admin-tags.js"></script>
</body>
</html>
