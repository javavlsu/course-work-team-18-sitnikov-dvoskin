<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
  <title>Пользователи · MovieHub Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header data-include="navbar"></header>

  <!-- Pattern: Linear admin users table + Stripe customers list. Inline role/active toggle. -->
  <div class="admin-layout">
    <div data-include="admin-sidebar"></div>

    <main class="admin-content">
      <div class="admin-page-head">
        <div>
          <span class="eyebrow">Сообщество</span>
          <h1>Пользователи</h1>
        </div>
        <div class="text-muted small mono" id="users-count">—</div>
      </div>

      <div class="filter-rail-section">
        <div class="filter-rail-label">Роль</div>
        <div class="filter-rail-group" id="role-group">
          <button class="filter-chip is-active" data-role="">Все</button>
          <button class="filter-chip" data-role="USER">Пользователь</button>
          <button class="filter-chip" data-role="ADMIN">Админ</button>
        </div>
        <div class="filter-rail-label mt-2">Состояние</div>
        <div class="filter-rail-group" id="active-group">
          <button class="filter-chip is-active" data-active="">Все</button>
          <button class="filter-chip" data-active="true">Активные</button>
          <button class="filter-chip" data-active="false">Заблокированные</button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Логин</th>
              <th>Почта</th>
              <th>Роль</th>
              <th>Статус</th>
              <th>Регистрация</th>
              <th class="text-end">Действия</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>

      <div id="pagination-mount"></div>
    </main>
  </div>

  <footer data-include="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/partials.js"></script>
  <script src="/js/page-admin-users.js"></script>
</body>
</html>
