<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
  <title>Дашборд · MovieHub Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header data-include="navbar"></header>

  <!--
    Pattern: Linear admin dashboard / Vercel admin (sidebar + content + stat cards row + chart placeholders).
    Pattern: Stripe dashboard (number prominent, label uppercase, breakdown small).
  -->
  <div class="admin-layout">
    <div data-include="admin-sidebar"></div>

    <main class="admin-content">
      <div class="admin-page-head">
        <div>
          <span class="eyebrow">Админ</span>
          <h1>Дашборд</h1>
        </div>
      </div>

      <div class="auth-alert" id="dash-error" hidden></div>

      <h2 class="h5 text-muted mb-3" style="letter-spacing:.08em;font-weight:700">Пользователи</h2>
      <div class="row g-3 mb-5" id="users-stats"></div>

      <h2 class="h5 text-muted mb-3" style="letter-spacing:.08em;font-weight:700">Контент</h2>
      <div class="row g-3 mb-5" id="content-stats"></div>

      <h2 class="h5 text-muted mb-3" style="letter-spacing:.08em;font-weight:700">Активность</h2>
      <div class="row g-3 mb-5" id="activity-stats"></div>
    </main>
  </div>

  <footer data-include="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/partials.js"></script>
  <script src="/js/page-admin.js"></script>
</body>
</html>
