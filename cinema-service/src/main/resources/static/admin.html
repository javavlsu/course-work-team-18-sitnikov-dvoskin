<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
  <title>Дашборд · MovieHub Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header data-include="navbar"></header>

  <div class="admin-layout">
    <div data-include="admin-sidebar"></div>

    <main class="admin-content">
      <div class="admin-page-head">
        <div>
          <span class="eyebrow">Админ</span>
          <h1>Дашборд</h1>
        </div>
      </div>

      <div class="auth-alert" id="dash-error" hidden></div>

      <section class="dash-section">
        <h2 class="dash-section-title">Пользователи</h2>
        <ul class="dash-stat-row" id="users-stats"></ul>
        <div class="dash-breakdown" id="users-breakdown"></div>
      </section>

      <section class="dash-section">
        <h2 class="dash-section-title">Контент</h2>
        <ul class="dash-stat-row" id="content-stats"></ul>
        <div class="dash-breakdown" id="content-breakdown"></div>
      </section>

      <section class="dash-section">
        <h2 class="dash-section-title">Активность</h2>
        <ul class="dash-stat-row" id="activity-stats"></ul>
        <div class="dash-breakdown" id="activity-breakdown"></div>
      </section>
    </main>
  </div>

  <footer data-include="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/partials.js"></script>
  <script src="/js/page-admin.js"></script>
</body>
</html>
