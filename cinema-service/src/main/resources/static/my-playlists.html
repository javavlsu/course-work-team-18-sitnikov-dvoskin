<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
  <title>Мои подборки · MovieHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header data-include="navbar"></header>

  <!--
    Pattern: Spotify "Your Library" / Letterboxd Lists — grid карточек подборок,
    каждая с mosaic cover (4 mini posters), title, owner, count, public/private badge.
  -->
  <main class="container my-4 my-lg-5">

    <header class="d-flex justify-content-between align-items-end flex-wrap gap-3 mb-4">
      <div>
        <span class="eyebrow">Кабинет</span>
        <h1>Мои подборки</h1>
        <p class="text-muted">Собирайте кино так, как удобно — для себя или для других.</p>
      </div>
      <a href="/playlists/new" class="btn btn-primary">+ Новая подборка</a>
    </header>

    <div class="row g-3" id="grid"></div>

  </main>

  <footer data-include="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/partials.js"></script>
  <script src="/js/page-my-playlists.js"></script>
</body>
</html>
