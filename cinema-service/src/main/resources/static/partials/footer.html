<!--
  Единый footer для всех 21 страницы MovieHub.

-->
<footer class="site-footer">
  <div class="container">
    <div class="row g-4 align-items-start">
      <div class="col-12 col-md-4">
        <a class="g-nav-brand" href="/" aria-label="MovieHub — главная">
          <span class="g-brand-circle" aria-hidden="true">
            <svg class="g-brand-mark" width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M12 1L13.8 9.2L22 11L13.8 12.8L12 21L10.2 12.8L2 11L10.2 9.2Z" fill="currentColor"/>
            </svg>

        </p>
      </div>

      <div class="col-6 col-md-2">

        <ul class="footer-links" data-auth-user hidden>
