<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
  <title>Новая подборка · MovieHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header data-include="navbar"></header>

  <!-- Pattern: Spotify "Create playlist" modal — minimal form, public/private toggle, save → redirect to detail -->
  <main class="container container-narrow my-4 my-lg-5">

    <nav class="mb-3">
      <a href="/me/playlists" class="subtle small">← К моим подборкам</a>
    </nav>

    <header class="mb-4">
      <span class="eyebrow">Новая коллекция</span>
      <h1>Создать подборку</h1>
    </header>

    <div class="auth-alert" id="form-error" hidden></div>

    <form id="create-form" class="card">
      <div class="card-body">

        <div class="mb-3">
          <label class="form-label" for="p-title">Название</label>
          <input type="text" class="form-control form-control-lg" id="p-title" maxlength="100" required placeholder="Например, «Кино для дождливого вечера»">
        </div>

        <div class="mb-3">
          <label class="form-label" for="p-desc">Описание</label>
          <textarea class="form-control" id="p-desc" rows="4" placeholder="О чём эта подборка?"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label" for="p-cover">URL обложки (опционально)</label>
          <input type="url" class="form-control" id="p-cover" maxlength="500" placeholder="https://…">
          <div class="form-help">Если не указать — обложкой станут постеры первых четырёх фильмов подборки.</div>
        </div>

        <div class="mb-4">
          <label class="form-label">Видимость</label>
          <div class="d-flex flex-column gap-2">
            <label class="visibility-option">
              <input class="form-check-input" type="radio" name="p-visibility" value="public" checked>
              <span>
                <strong>Публичная</strong> — видна всем посетителям сайта, появляется в публичных списках
              </span>
            </label>
            <label class="visibility-option">
              <input class="form-check-input" type="radio" name="p-visibility" value="private">
              <span>
                <strong>Приватная</strong> — видна только мне, не появляется ни в каких списках
              </span>
            </label>
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2">
          <a href="/me/playlists" class="btn btn-ghost">Отмена</a>
          <button type="submit" class="btn btn-primary">Создать</button>
        </div>
      </div>
    </form>

  </main>

  <footer data-include="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/partials.js"></script>
  <script src="/js/page-playlist-create.js"></script>
</body>
</html>
