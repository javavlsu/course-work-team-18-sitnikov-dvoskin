<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
  <title>Подборка · MovieHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header data-include="navbar"></header>

  <!--
    Pattern: Spotify playlist page — большая обложка слева + title + meta + actions справа,
    под ним список треков (у нас — фильмов). Hover-row, owner avatar.
  -->
  <main class="container my-4 my-lg-5">

    <section class="playlist-hero">
      <div id="hero-cover">
        <div class="playlist-hero-cover cover-mosaic">
          <div class="poster-fallback"><span>?</span></div>
          <div class="poster-fallback"><span>?</span></div>
          <div class="poster-fallback"><span>?</span></div>
          <div class="poster-fallback"><span>?</span></div>
        </div>
      </div>
      <div>
        <span class="eyebrow" id="hero-eyebrow">Подборка</span>
        <h1 id="hero-title">Загрузка…</h1>
        <p class="text-secondary" id="hero-desc"></p>
        <div class="d-flex align-items-center flex-wrap gap-3 mt-3">
          <a class="d-flex align-items-center gap-2" id="owner-link" href="#" style="text-decoration:none;color:inherit">
            <span class="user-avatar" id="owner-avatar">U</span>
            <div>
              <div class="fw-bold" id="owner-name">…</div>
              <div class="text-muted small" id="owner-meta"></div>
            </div>
          </a>
        </div>
        <div class="d-flex gap-2 mt-4" id="hero-actions">
          <a class="btn btn-outline-light" id="edit-link" href="#" hidden>Редактировать</a>
          <button class="btn btn-outline-danger" id="delete-btn" hidden>Удалить</button>
        </div>

        <!-- Оценка подборки 1–5 (CollectionRating из Этапа 3) -->
        <div class="mt-4" id="rating-block">
          <div class="text-muted small mb-1">Оцените подборку</div>
          <div class="d-flex align-items-center flex-wrap gap-3">
            <div class="star-rating" id="pl-stars" data-star-rating></div>
            <span class="rating-inline" id="pl-rating-summary" hidden></span>
            <button type="button" class="btn btn-xs btn-outline-light" id="pl-rating-remove" hidden>Убрать оценку</button>
          </div>
          <div class="text-muted small mt-1" id="pl-rating-auth-hint" hidden>
            <a href="#" id="pl-rating-login-link">Войдите</a>, чтобы оценить подборку
          </div>
        </div>
      </div>
    </section>

    <div id="items-mount"></div>

  </main>

  <footer data-include="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/partials.js"></script>
  <script src="/js/page-playlist-detail.js"></script>
</body>
</html>
