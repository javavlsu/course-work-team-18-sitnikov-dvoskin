<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
  <title>Редактирование подборки · MovieHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header data-include="navbar"></header>

  <!--
    Pattern: Spotify edit playlist (поля + список треков с remove).
    Pattern: Letterboxd edit list (typeahead для добавления + remove kn).
    Scope: НЕТ drag-only-visual handles. Сортировка через стрелочки ↑/↓ (вызывает reorder API).
  -->
  <main class="container container-narrow my-4 my-lg-5">

    <nav class="mb-3">
      <a id="back-link" href="#" class="subtle small">← К подборке</a>
    </nav>

    <header class="mb-4">
      <span class="eyebrow">Редактирование</span>
      <h1>Изменить подборку</h1>
    </header>

    <div class="auth-alert" id="form-error" hidden></div>
    <div class="auth-alert is-success" id="form-success" hidden></div>

    <form id="edit-form" class="card mb-4">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label" for="p-title">Название</label>
          <input class="form-control form-control-lg" type="text" id="p-title" maxlength="100">
        </div>
        <div class="mb-3">
          <label class="form-label" for="p-desc">Описание</label>
          <textarea class="form-control" id="p-desc" rows="3"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label" for="p-cover">URL обложки</label>
          <input class="form-control" type="url" id="p-cover" maxlength="500">
        </div>
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" id="p-public">
          <label class="form-check-label" for="p-public">Публичная</label>
        </div>
        <div class="d-flex justify-content-end gap-2">
          <button type="submit" class="btn btn-primary">Сохранить</button>
        </div>
      </div>
    </form>

    <!-- Add content typeahead -->
    <div class="card mb-4">
      <div class="card-body">
        <h3 class="card-title h5 mb-3">Добавить фильм или сериал</h3>
        <input type="text" class="form-control" id="add-search" placeholder="Поиск…" autocomplete="off">
        <div id="add-suggestions" class="mt-3"></div>
      </div>
    </div>

    <!-- Items with reorder -->
    <h3 class="h5 mb-3">В подборке</h3>
    <div id="items-mount"></div>

  </main>

  <footer data-include="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/partials.js"></script>
  <script src="/js/page-playlist-edit.js"></script>
</body>
</html>
