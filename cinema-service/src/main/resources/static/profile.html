<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
  <title>Мой профиль · MovieHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header data-include="navbar"></header>

  <!--
    Pattern: Letterboxd profile (refero search "letterboxd profile stats"):
    big circular avatar + display name + handle + 4-tile stats grid + tab navigation
    (Films / Reviews / Lists). Recent items below tabs.
  -->
  <main class="container my-4 my-lg-5">

    <section class="profile-header" id="profile-header">
      <div class="user-avatar user-avatar-lg" data-user-avatar>?</div>
      <div class="flex-grow-1">
        <h1 class="profile-name" id="prof-name">Загрузка…</h1>
        <p class="profile-handle" id="prof-handle">@…</p>
        <p class="text-muted small mb-0" id="prof-meta"></p>
      </div>
      <div class="d-flex gap-2 align-items-center">
        <a class="btn btn-outline-light" href="/me/reviews">Мои рецензии</a>
        <a class="btn btn-outline-light" href="/me/playlists">Мои подборки</a>
      </div>
    </section>

    <section class="profile-stats-grid mb-5" id="prof-stats">
      <div class="profile-stat-tile"><div class="num skeleton" style="width:60px;height:28px"></div><div class="label">Рецензии</div></div>
      <div class="profile-stat-tile"><div class="num skeleton" style="width:60px;height:28px"></div><div class="label">Подборки</div></div>
      <div class="profile-stat-tile"><div class="num skeleton" style="width:60px;height:28px"></div><div class="label">Оценки</div></div>
      <div class="profile-stat-tile"><div class="num skeleton" style="width:60px;height:28px"></div><div class="label">Средняя</div></div>
    </section>

    <!-- Tabs (Letterboxd profile pattern) -->
    <div class="tab-pills">
      <button class="tab-pill is-active" data-tab="reviews">Рецензии <span class="tab-count" id="cnt-reviews">0</span></button>
      <button class="tab-pill" data-tab="playlists">Подборки <span class="tab-count" id="cnt-playlists">0</span></button>
      <button class="tab-pill" data-tab="settings">Настройки</button>
    </div>

    <section id="tab-reviews" class="tab-content">
      <div id="reviews-mount"></div>
    </section>

    <section id="tab-playlists" class="tab-content" hidden>
      <div class="row g-3" id="playlists-mount"></div>
    </section>

    <section id="tab-settings" class="tab-content" hidden>
      <div class="auth-card mx-auto" style="max-width:560px;">
        <h3 class="mb-3">Настройки профиля</h3>
        <div class="auth-alert" id="settings-success" hidden></div>
        <form id="settings-form">
          <div class="mb-3">
            <label class="form-label">Логин</label>
            <input class="form-control" type="text" id="set-username" minlength="3" maxlength="50">
          </div>
          <div class="mb-3">
            <label class="form-label">Почта</label>
            <input class="form-control" type="email" id="set-email" maxlength="100">
          </div>
          <div class="d-flex justify-content-between align-items-center mt-4">
            <button type="button" class="btn btn-outline-danger btn-sm" data-auth-logout>Выйти</button>
            <button type="submit" class="btn btn-primary">Сохранить</button>
          </div>
        </form>
      </div>
    </section>

  </main>

  <footer data-include="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/partials.js"></script>
  <script src="/js/page-profile.js"></script>
</body>
</html>
