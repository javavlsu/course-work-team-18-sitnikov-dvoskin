<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
  <title>Настройки · MovieHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header data-include="navbar"></header>

  <main class="container my-4 my-lg-5">

    <div class="settings-shell">
      <aside class="settings-sidebar">
        <a class="settings-back" href="/profile">← К профилю</a>
        <nav class="settings-nav">
          <button class="settings-nav-item is-active" data-section="profile">Профиль</button>
          <button class="settings-nav-item" data-section="account">Аккаунт</button>
        </nav>
      </aside>

      <section class="settings-main">
        <div data-section-panel="profile">
          <header class="settings-header">
            <h1>Профиль</h1>
            <p>Имя, почта — как тебя видят другие пользователи.</p>
          </header>

          <div class="settings-card">
            <div class="auth-alert" id="settings-success" hidden></div>
            <form id="settings-form" novalidate>
              <div class="mb-3">
                <label class="form-label" for="set-username">Логин</label>
                <input class="form-control" type="text" id="set-username" minlength="3" maxlength="50" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="set-email">Почта</label>
                <input class="form-control" type="email" id="set-email" maxlength="100" required>
              </div>
              <div class="d-flex justify-content-end">
                <button type="submit" class="btn btn-primary">Сохранить</button>
              </div>
            </form>
          </div>
        </div>

        <div data-section-panel="account" hidden>
          <header class="settings-header">
            <h1>Аккаунт</h1>
            <p>Сессия и выход.</p>
          </header>

          <div class="settings-card">
            <div class="settings-row">
              <div>
                <div class="settings-row-title">Выйти из аккаунта</div>
                <div class="settings-row-sub">Сессия завершится на этом устройстве.</div>
              </div>
              <button class="btn btn-outline-danger" type="button" data-auth-logout>Выйти</button>
            </div>
          </div>
        </div>
      </section>
    </div>

  </main>

  <footer data-include="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/partials.js"></script>
  <script src="/js/page-settings.js"></script>
</body>
</html>
