spring:
  application:
    name: cinema-service-test

  datasource:
    url: jdbc:h2:mem:cinemadb_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  sql:
    init:
      mode: never

  main:
    allow-bean-definition-overriding: true
